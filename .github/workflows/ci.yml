name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend (TypeScript + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build frontend
        run: npm run build

  rust:
    name: Rust (check + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf clang libclang-dev cmake

      - name: Set LIBCLANG_PATH
        run: |
          LIBCLANG=$(find /usr/lib -name "libclang*.so*" 2>/dev/null | head -1)
          echo "LIBCLANG_PATH=$(dirname $LIBCLANG)" >> $GITHUB_ENV

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo check
        working-directory: src-tauri
        run: cargo check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
