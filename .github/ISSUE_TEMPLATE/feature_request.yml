name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for DragonFly? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should the feature do? How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there workarounds or alternative approaches you considered?

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Tasks / Kanban
        - Notes / Editor
        - Reminders
        - Voice / Transcription
        - Sync / PocketBase
        - Backup / Export
        - UI / UX
        - Performance
        - i18n / Localization
        - Build / CI
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
