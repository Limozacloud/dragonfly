<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1"/>
      <stop offset="100%" style="stop-color:#2b6cb0"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="50" cy="55" rx="12" ry="25" fill="url(#bodyGrad)"/>
  <!-- Head -->
  <circle cx="50" cy="25" r="12" fill="url(#bodyGrad)"/>
  <!-- Eyes -->
  <circle cx="45" cy="22" r="4" fill="#1a365d"/>
  <circle cx="55" cy="22" r="4" fill="#1a365d"/>
  <circle cx="46" cy="21" r="1.5" fill="white"/>
  <circle cx="56" cy="21" r="1.5" fill="white"/>
  <!-- Wings -->
  <ellipse cx="25" cy="45" rx="20" ry="8" fill="#bee3f8" opacity="0.8" transform="rotate(-15 25 45)"/>
  <ellipse cx="75" cy="45" rx="20" ry="8" fill="#bee3f8" opacity="0.8" transform="rotate(15 75 45)"/>
  <ellipse cx="28" cy="55" rx="18" ry="6" fill="#90cdf4" opacity="0.7" transform="rotate(-10 28 55)"/>
  <ellipse cx="72" cy="55" rx="18" ry="6" fill="#90cdf4" opacity="0.7" transform="rotate(10 72 55)"/>
  <!-- Tail segments -->
  <ellipse cx="50" cy="85" rx="6" ry="10" fill="url(#bodyGrad)"/>
</svg>
